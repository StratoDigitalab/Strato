   Glide is now transform-only (no left/top/width transitions)
   so it runs as a pure GPU composite — buttery smooth.
   Logo size is FIXED; intro vs monument differ only by transform.
   ============================================================ */

[data-testid="logo-stage"],
[data-testid="assembled-logo"] {
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

:root {
  --strato-ease-out:    cubic-bezier(0.16, 1, 0.30, 1);
  --strato-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --strato-ease-soft:   cubic-bezier(0.22, 1, 0.36, 1);
  --strato-glow:        167, 139, 250;

  /* Monument translate targets — set by JS per viewport */
  --strato-tx: 0vw;
  --strato-ty: 0vh;
}

html.strato-intro-running,
html.strato-intro-running body {
  overflow: hidden !important;
}

/* ------- STAGE ------- */
#strato-intro-stage {
  position: fixed;
  inset: 0;
  z-index: 2147483000;
  pointer-events: none;
  contain: layout style paint;
  transform: translateZ(0);
  will-change: opacity;
}

#strato-intro-stage .strato-bg {
  position: absolute;
  inset: 0;
  background: #06050A;
  opacity: 1;
  transition: opacity 2200ms var(--strato-ease-in-out);
  will-change: opacity;
}

#strato-intro-stage .strato-ambient {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(45% 35% at 50% 50%,
      rgba(var(--strato-glow), 0.10) 0%,
      rgba(var(--strato-glow), 0.04) 35%,
      rgba(var(--strato-glow), 0)    70%);
  opacity: 0;
  transition: opacity 2400ms var(--strato-ease-out);
  pointer-events: none;
  will-change: opacity;
}

/* ------- LOGO GROUP (size is FIXED — only transform animates) ------- */
#strato-intro-stage .strato-logo {
  position: absolute;
  left: 50%;
  top:  50%;
  /* monument size — same number throughout, never transitioned */
  width: clamp(360px, 34vw, 720px);
  aspect-ratio: 616 / 361;
  transform: translate3d(-50%, -50%, 0) scale(0.96);
  opacity: 0;
  /* ONLY transform + opacity animated → pure GPU composite */
  transition:
    transform 2400ms var(--strato-ease-out),
    opacity   1600ms var(--strato-ease-out);
  will-change: transform, opacity;
  /* never clickable — pure atmospheric element */
  pointer-events: none;
}

#strato-intro-stage .strato-logo svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* ─── Pre-rendered glow layers — animated only via opacity ────── */
#strato-intro-stage .strato-glow-core,
#strato-intro-stage .strato-glow-soft,
#strato-intro-stage .strato-glow-bed {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1600ms var(--strato-ease-out);
  will-change: opacity;
  transform: translateZ(0);
}
#strato-intro-stage .strato-glow-core {
  inset: -40% -15%;
  background: radial-gradient(50% 50% at 50% 50%,
    rgba(var(--strato-glow), 0.55) 0%,
    rgba(var(--strato-glow), 0.18) 40%,
    rgba(var(--strato-glow), 0)    72%);
}
#strato-intro-stage .strato-glow-soft {
  inset: -100% -45%;
  background: radial-gradient(50% 50% at 50% 50%,
    rgba(var(--strato-glow), 0.22) 0%,
    rgba(var(--strato-glow), 0.08) 35%,
    rgba(var(--strato-glow), 0)    70%);
}
#strato-intro-stage .strato-glow-bed {
  inset: -180% -70%;
  background: radial-gradient(50% 50% at 50% 50%,
    rgba(var(--strato-glow), 0.10) 0%,
    rgba(var(--strato-glow), 0.04) 40%,
    rgba(var(--strato-glow), 0)    74%);
}

/* ─── PHASE: VOID ────────────────────────── */
html.strato-phase-void #strato-intro-stage .strato-ambient { opacity: 0.35; }

/* ─── PHASE: EMERGE ───────────────────────── */
html.strato-phase-emerge #strato-intro-stage .strato-logo {
  transform: translate3d(-50%, -50%, 0) scale(1);
  opacity: 1;
}
html.strato-phase-emerge #strato-intro-stage .strato-ambient   { opacity: 0.55; }
html.strato-phase-emerge #strato-intro-stage .strato-glow-soft { opacity: 0.55; }
html.strato-phase-emerge #strato-intro-stage .strato-glow-core { opacity: 0.65; }

/* ─── PHASE: SETTLE ───────────────────────── */
html.strato-phase-settle #strato-intro-stage .strato-logo {
  transform: translate3d(-50%, -50%, 0) scale(1);
  opacity: 1;
}
html.strato-phase-settle #strato-intro-stage .strato-ambient   { opacity: 0.55; }
html.strato-phase-settle #strato-intro-stage .strato-glow-soft {
  opacity: 0.55;
  animation: strato-breathe-soft 3200ms ease-in-out infinite alternate;
}
html.strato-phase-settle #strato-intro-stage .strato-glow-core {
  opacity: 0.65;
  animation: strato-breathe-core 3200ms ease-in-out infinite alternate;
}

@keyframes strato-breathe-soft { to { opacity: 0.80; } }
@keyframes strato-breathe-core { to { opacity: 0.85; } }
@keyframes strato-breathe-bed  { to { opacity: 0.70; } }

/* ─── PHASE: REVEAL & MONUMENT ─────────────
   The ONLY change is the transform — pure GPU composite glide. */
html.strato-phase-reveal #strato-intro-stage .strato-bg,
html.strato-phase-monument #strato-intro-stage .strato-bg {
  opacity: 0;
}
html.strato-phase-reveal #strato-intro-stage .strato-ambient,
html.strato-phase-monument #strato-intro-stage .strato-ambient {
  opacity: 0;
}

html.strato-phase-reveal #strato-intro-stage .strato-logo,
html.strato-phase-monument #strato-intro-stage .strato-logo {
  transform: translate3d(
    calc(-50% + var(--strato-tx)),
    calc(-50% + var(--strato-ty)),
    0) scale(1);
  opacity: 1;
}

html.strato-phase-reveal #strato-intro-stage .strato-glow-soft {
  opacity: 0.55;
  animation: strato-breathe-soft 5200ms ease-in-out infinite alternate;
}
html.strato-phase-reveal #strato-intro-stage .strato-glow-core {
  opacity: 0.55;
  animation: strato-breathe-core 5200ms ease-in-out infinite alternate;
}
html.strato-phase-reveal #strato-intro-stage .strato-glow-bed {
  opacity: 0.45;
}

/* ─── MONUMENT (docked, ambient drift only, NOT clickable) ────── */
html.strato-phase-monument #strato-intro-stage {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
}
html.strato-phase-monument #strato-intro-stage .strato-logo {
  /* purely atmospheric — never interactive */
  pointer-events: none;
  cursor: default;
  animation: strato-monument-drift 11000ms ease-in-out infinite alternate;
}
html.strato-phase-monument #strato-intro-stage .strato-glow-soft {
  opacity: 0.55;
  animation: strato-breathe-soft 6200ms ease-in-out infinite alternate;
}
html.strato-phase-monument #strato-intro-stage .strato-glow-core {
  opacity: 0.55;
  animation: strato-breathe-core 6200ms ease-in-out infinite alternate;
}
html.strato-phase-monument #strato-intro-stage .strato-glow-bed {
  opacity: 0.50;
  animation: strato-breathe-bed 7800ms ease-in-out infinite alternate;
}

/* Drift keyframe — applies the monument translate offset + parallax,
   so the logo stays anchored to the right while breathing ±4px. */
@keyframes strato-monument-drift {
  0% {
    transform: translate3d(
      calc(-50% + var(--strato-tx) + var(--strato-mx, 0px)),
      calc(-50% + var(--strato-ty) + var(--strato-my, 0px) - 4px),
      0) scale(1);
  }
  100% {
    transform: translate3d(
      calc(-50% + var(--strato-tx) + var(--strato-mx, 0px)),
      calc(-50% + var(--strato-ty) + var(--strato-my, 0px) + 4px),
      0) scale(1);
  }
}

/* ─── Responsive ────────────── */
@media (max-width: 900px) {
  #strato-intro-stage .strato-logo {
    width: clamp(240px, 52vw, 460px);
  }
  html.strato-phase-monument #strato-intro-stage .strato-glow-bed {
    animation: none;
    opacity: 0.55;
  }
}

@media (prefers-reduced-motion: reduce) {
  #strato-intro-stage *,
  html.strato-phase-monument #strato-intro-stage .strato-logo,
  html.strato-phase-monument #strato-intro-stage .strato-glow-core,
  html.strato-phase-monument #strato-intro-stage .strato-glow-soft,
  html.strato-phase-monument #strato-intro-stage .strato-glow-bed {
    animation: none !important;
    transition: opacity 600ms ease !important;
  }
}
</style><style data-strato="legal">/* ============================================================
   STRATO · GDPR / cookie consent + legal overlay
   ============================================================ */
.strato-cookie {
  position: fixed;
  left: 24px;
  right: 24px;
  bottom: 24px;
  z-index: 2147482900;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 18px 22px;
  background: rgba(11, 10, 16, 0.78);
  border: 1px solid rgba(236, 233, 245, 0.14);
  border-radius: 16px;
  color: #ECE9F5;
  font-family: "Manrope", "Outfit", system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.55;
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  box-shadow:
    0 18px 60px -20px rgba(0, 0, 0, 0.65),
    0 0 0 1px rgba(255, 255, 255, 0.02) inset;
  opacity: 0;
  transform: translate3d(0, 18px, 0);
  transition:
    opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
    transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: auto;
  max-width: 720px;
}
.strato-cookie.is-visible {
  opacity: 1;
  transform: translate3d(0, 0, 0);
}
.strato-cookie .c-mark {
  width: 28px;
  height: 28px;
  flex: 0 0 28px;
  border-radius: 50%;
  margin-top: 2px;
  background:
    radial-gradient(60% 60% at 50% 45%, #A78BFA 0%, #6B46FF 60%, #0B0A10 100%);
  box-shadow: 0 0 14px rgba(167, 139, 250, 0.55);
}
.strato-cookie .c-text {
  flex: 1 1 auto;
}
.strato-cookie .c-text b {
  display: block;
  font-family: "Outfit", "Manrope", sans-serif;
  font-weight: 500;
  letter-spacing: 0.04em;
  font-size: 13.5px;
  margin-bottom: 4px;
  color: #ECE9F5;
}
.strato-cookie .c-text span {
  color: rgba(236, 233, 245, 0.7);
}
.strato-cookie .c-text a {
  color: #A78BFA;
  text-decoration: none;
  border-bottom: 1px dashed rgba(167, 139, 250, 0.4);
}
.strato-cookie .c-text a:hover {
  border-bottom-color: #A78BFA;
}
.strato-cookie .c-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.strato-cookie button {
  font-family: "Manrope", system-ui, sans-serif;
  font-size: 12.5px;
  letter-spacing: 0.04em;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  color: rgba(236, 233, 245, 0.78);
  transition: background 220ms ease, color 220ms ease, border-color 220ms ease, transform 220ms ease;
}
.strato-cookie button:hover { color: #ECE9F5; }
.strato-cookie button.c-deny {
  border-color: rgba(236, 233, 245, 0.18);
}
.strato-cookie button.c-deny:hover {
  border-color: rgba(236, 233, 245, 0.36);
}
.strato-cookie button.c-accept {
  background: #A78BFA;
  color: #0B0A10;
  font-weight: 600;
  box-shadow: 0 10px 30px -10px rgba(167, 139, 250, 0.55);
}
.strato-cookie button.c-accept:hover {
  background: #b89bff;
  transform: translateY(-1px);
}

/* ---- legal page (privacy/cookie/imprint) ---- */
.strato-legal-modal {
  position: fixed;
  inset: 0;
  z-index: 2147482950;
  display: none;
  align-items: stretch;
  justify-content: center;
  background: rgba(6, 5, 10, 0.78);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 5vh 5vw;
  opacity: 0;
  transition: opacity 400ms ease;
}
.strato-legal-modal.is-open {
  display: flex;
  opacity: 1;
}
.strato-legal-modal .l-sheet {
  width: 100%;
  max-width: 880px;
  background: #0B0A10;
  border: 1px solid rgba(236, 233, 245, 0.12);
  border-radius: 20px;
  padding: 36px 42px;
  color: #ECE9F5;
  font-family: "Manrope", system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.7;
  overflow-y: auto;
  max-height: 90vh;
  position: relative;
}
.strato-legal-modal h2 {
  font-family: "Outfit", sans-serif;
  font-weight: 300;
  font-size: 32px;
  letter-spacing: -0.01em;
  margin: 0 0 8px;
}
.strato-legal-modal .eyebrow {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  letter-spacing: 0.24em;
  font-size: 11px;
  text-transform: uppercase;
  color: rgba(167, 139, 250, 0.85);
  margin-bottom: 22px;
}
.strato-legal-modal h3 {
  font-family: "Outfit", sans-serif;
  font-weight: 500;
  font-size: 16px;
  letter-spacing: 0.02em;
  margin: 22px 0 6px;
  color: #ECE9F5;
}
.strato-legal-modal p,
.strato-legal-modal li {
  color: rgba(236, 233, 245, 0.76);
}
.strato-legal-modal a {
  color: #A78BFA;
  text-decoration: none;
}
.strato-legal-modal .l-close {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid rgba(236, 233, 245, 0.18);
  color: rgba(236, 233, 245, 0.8);
  cursor: pointer;
  transition: background 220ms ease, border-color 220ms ease;
  font-size: 16px;
  line-height: 0;
}
.strato-legal-modal .l-close:hover {
  background: rgba(236, 233, 245, 0.06);
  border-color: rgba(236, 233, 245, 0.36);
}

/* tiny floating "Privacy · Cookie · Imprint" footer-strip link */
.strato-legal-pill {
  position: fixed;
  left: 24px;
  bottom: 16px;
  z-index: 2147482800;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(236, 233, 245, 0.14);
  background: rgba(11, 10, 16, 0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(236, 233, 245, 0.62);
  cursor: pointer;
  opacity: 0;
  transition: opacity 600ms ease, color 220ms ease, border-color 220ms ease;
}
.strato-legal-pill.is-visible { opacity: 1; }
.strato-legal-pill:hover {
  color: #ECE9F5;
  border-color: rgba(236, 233, 245, 0.3);
}

@media (max-width: 720px) {
  .strato-cookie {
    flex-direction: column;
    left: 12px;
    right: 12px;
    bottom: 12px;
    padding: 16px;
  }
  .strato-cookie .c-actions { width: 100%; justify-content: flex-end; }
  .strato-legal-pill { left: 12px; bottom: 8px; }
}

    function rewriteSrc(s) {
      if (!s) return s;
      var bare = s.replace(/^.*\//, '');
      if (STRATO_DATA_URIS[bare]) return STRATO_DATA_URIS[bare];

      if (!s) return s;
      if (/^\/?strato-(layer-(top|bottom)|paths-all)\.svg$/.test(s)) {
        return base + s.replace(/^\//, "");
      }
      return s;

        var nx = rewriteSrc(src);
        if (nx && nx !== src) node.setAttribute("src", nx);
        node.addEventListener("error", function () {

      }
      // SVG <image href="/strato-paths-all.svg">
      if (node.tagName === "image" || node.localName === "image") {
        var href = node.getAttribute("href") || node.getAttribute("xlink:href");
        var nh = rewriteSrc(href);

          node.setAttribute("xlink:href", nh);
        }

      // real account.
      if (node.tagName === "A") {

          /^https?:\/\/(www\.)?linkedin\.com\/?$/.test(h) ||
          h === "https://linkedin.com"
        ) {

      for (var i = 0; i < imgs.length; i++) fixNode(imgs[i]);

      setPhase("monument");
      html.classList.remove("strato-intro-running");
      enableParkedBehaviors();
    }, 7400);

    // ── Parallax (subtle, desktop only) + scroll fade ──
    function enableParkedBehaviors() {
      var hero = stage.querySelector(".strato-logo");
      if (!hero) return;
      var isMobile = window.matchMedia("(max-width: 900px)").matches;

      if (!isMobile) {
        var rafId = null;
        var tx = 0, ty = 0, cx = 0, cy = 0;
        var max = 8;   // px — even more subtle now
        function onMove(e) {
          var w = window.innerWidth || 1, h = window.innerHeight || 1;
          tx = ((e.clientX / w) - 0.5) * -2 * max;
          ty = ((e.clientY / h) - 0.5) * -2 * max;
          if (rafId == null) rafId = requestAnimationFrame(tick);
        }
        function tick() {
          cx += (tx - cx) * 0.04;
          cy += (ty - cy) * 0.04;
          hero.style.setProperty("--strato-mx", cx.toFixed(2) + "px");
          hero.style.setProperty("--strato-my", cy.toFixed(2) + "px");
          if (Math.abs(tx - cx) > 0.15 || Math.abs(ty - cy) > 0.15) {
            rafId = requestAnimationFrame(tick);
          } else { rafId = null; }
        }
        window.addEventListener("mousemove", onMove, { passive: true });
      }

      // Scroll-driven fade — opacity only, rAF-throttled
      var scrollRaf = null;
      var lastY = -1;
      function onScrollFrame() {
        scrollRaf = null;
        var y = window.scrollY || window.pageYOffset || 0;
        if (y === lastY) return;
        lastY = y;
        var vh = window.innerHeight || 1;
        var t = Math.min(1, y / (vh * 0.95));
        var ease = 1 - Math.pow(1 - t, 2);
        hero.style.opacity = (1 - ease * 0.95).toFixed(3);
      }
      function onScroll() {
        if (scrollRaf == null) scrollRaf = requestAnimationFrame(onScrollFrame);
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      setInterval(onScroll, 120);
      onScrollFrame();
    }
  }

  onReady(mount);
})();
</script><script data-strato="legal">/* STRATO · GDPR cookie banner + legal modal (Privacy · Cookie · Imprint) */
(function () {

  function getConsent() {

    catch (e) { return null; }

  function setConsent(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function buildLegalModal() {
    var modal = document.createElement("div");
    modal.className = "strato-legal-modal";

    modal.innerHTML = ''
      + '<div class="l-sheet" data-testid="strato-legal-sheet">'
      +   '<button class="l-close" data-testid="strato-legal-close" aria-label="Chiudi">×</button>'
      +   '<div class="eyebrow">· Note legali · STRATO</div>'
      +   '<h2>Privacy, cookie e informazioni del titolare</h2>'
      +   '<p>Questa nota informativa è fornita ai sensi del <strong>Regolamento UE 2016/679 (GDPR)</strong> e del D.Lgs. 196/2003 come modificato dal D.Lgs. 101/2018. Il sito <strong>strato.studio</strong> è realizzato e gestito da <strong>STRATO · Boutique Creative Digital Studio</strong>.</p>'
      +   '<h3>1 · Titolare del trattamento</h3>'
      +   '<p>STRATO · Boutique Creative Digital Studio<br>Sede operativa: Italia<br>Email contatto: <a href="mailto:strato.digitalab@gmail.com">strato.digitalab@gmail.com</a><br>Instagram: <a href="https://www.instagram.com/strato.digitalab/" target="_blank" rel="noreferrer noopener">@strato.digitalab</a></p>'

      +   '<h3>3 · Cookie e tecnologie simili</h3>'
      +   '<ul>'
      +     '<li><strong>Cookie tecnici (sempre attivi)</strong>: necessari al funzionamento della pagina (es. preferenze di consenso, intro vista una volta per sessione). Non richiedono consenso.</li>'

      +   '<h3>4 · Base giuridica</h3>'
      +   '<p>Trattiamo i tuoi dati sulla base del tuo <strong>consenso esplicito</strong> (art. 6.1.a GDPR) per i cookie non strettamente tecnici, e sulla base di <strong>legittimo interesse</strong> / <strong>esecuzione di un contratto</strong> (art. 6.1.b/f) per le tue richieste di demo.</p>'

      +   '<h3>6 · Reclami</h3>'
      +   '<p>Puoi presentare reclamo al Garante per la protezione dei dati personali (<a href="https://www.garanteprivacy.it" target="_blank" rel="noopener">www.garanteprivacy.it</a>).</p>'
      +   '<h3>7 · Modifiche</h3>'
      +   '<p>Questa informativa può essere aggiornata. La data dell\'ultima revisione è riportata sul sito alla voce <em>Versione</em>.</p>'
      +   '<p style="margin-top:24px;opacity:0.5;font-size:12px;">Versione · 2026.01 — STRATO · Boutique Creative Digital Studio</p>'
      + '</div>';
    modal.addEventListener("click", function (e) {
      if (e.target === modal) close();
    });
    modal.querySelector(".l-close").addEventListener("click", close);
    function close() { modal.classList.remove("is-open"); }
    modal.openModal = function () { modal.classList.add("is-open"); };
    document.body.appendChild(modal);
    return modal;
  }

  function buildLegalPill(modal) {
    var pill = document.createElement("button");
    pill.type = "button";
    pill.className = "strato-legal-pill";
    pill.setAttribute("data-testid", "strato-legal-pill");
    pill.setAttribute("aria-label", "Apri note legali e privacy");
    pill.innerHTML = '· Privacy · Cookie · Imprint';
    pill.addEventListener("click", function () { modal.openModal(); });
    document.body.appendChild(pill);
    // appear after the intro, but only if the cookie banner is gone
    setTimeout(function () {
      if (!document.querySelector('.strato-cookie')) {

  function buildBanner(modal) {

      + '<div class="c-mark" aria-hidden="true"></div>'
      + '<div class="c-text">'
      +   '<b>Esperienza cinematografica · cookie</b>'
      +   '<span>Usiamo solo cookie tecnici. Per caricare i font Google (Manrope, Outfit, JetBrains Mono) e mantenere il rendering tipografico premium serve il tuo consenso. Nessun tracker pubblicitario, nessuna profilazione. <a href="#" data-testid="strato-cookie-more">Maggiori informazioni</a>.</span>'

      +   '<button class="c-deny"   data-testid="strato-cookie-deny">Solo essenziali</button>'

    banner.querySelector('[data-testid="strato-cookie-more"]').addEventListener("click", function (e) {

      setConsent({ fonts: true, ts: Date.now() });
      hide();
    });
    banner.querySelector(".c-deny").addEventListener("click", function () {
      setConsent({ fonts: false, ts: Date.now() });
      // Drop external Google Fonts stylesheets (best-effort)
      document.querySelectorAll('link[href*="fonts.googleapis.com"], link[href*="fonts.gstatic.com"]')
        .forEach(function (l) { l.parentNode && l.parentNode.removeChild(l); });
      hide();
    });
    function hide() {
      banner.classList.remove("is-visible");
      setTimeout(function () {
        banner.parentNode && banner.parentNode.removeChild(banner);
        var pill = document.querySelector('[data-testid="strato-legal-pill"]');
        if (pill) pill.classList.add("is-visible");
      }, 800);
    }
    document.body.appendChild(banner);
    setTimeout(function () { banner.classList.add("is-visible"); }, 6800);
    return banner;
  }

  onReady(function () {
    var modal = buildLegalModal();
    buildLegalPill(modal);
    if (!getConsent()) {
      buildBanner(modal);
    }
  });
})();
</script><script data-strato="contact">/* ============================================================
   STRATO · runtime patches
   - Reactivate the "Richiedi una Demo" form via Resend backend
     (intercepts the bundle's mailto submit, POSTs to /api/strato/contact)
   - Hide the "Per Chi / Non siamo per tutti" section and its
     navbar / footer links
   ============================================================ */
(function () {
  var CONTACT_ENDPOINT =
    (window.STRATO_API_BASE || "") + "/api/strato/contact";

  function onReady(fn) {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", fn, { once: true });
    } else { fn(); }
  }

  // ───── Resolve API base from current origin (works in iframe too) ─────
  (function resolveApiBase() {
    try {
      var origin = window.location.origin;
      if (window.top && window.top !== window) {
        // The static site is served as an iframe under /site/. The /api/
        // endpoints live on the same parent origin.
        origin = (window.top.location && window.top.location.origin) || origin;
      }
      CONTACT_ENDPOINT = origin + "/api/strato/contact";
    } catch (e) { /* cross-origin top window → keep relative endpoint */ }
  })();

  // ============================================================
  //        FIX #3 · clean up "Per Chi" — remove only the
  //        negative copy, keep the rest of the section intact
  // ============================================================
  function cleanupPerChiSection() {
    var NEGATIVE_LEAD =
      "Non siamo per tutti. Lavoriamo con poche realtà alla volta";
    var NEGATIVE_HEADERS = ["Non lavoriamo con"];
    var NEGATIVE_TAGS = [
      "Realtà che cercano lo sconto del web design",
      "Brand non disposti a curare i dettagli",
      "Progetti con tempistiche da catena di montaggio",
    ];

    function removeMatching(root) {
      if (!root) return;
      // 1) Lead paragraph (the "Non siamo per tutti…" sentence)
      var all = root.querySelectorAll("p, span, div");
      all.forEach(function (el) {
        var t = (el.textContent || "").trim();
        if (!t) return;
        if (t.indexOf(NEGATIVE_LEAD) === 0 &&
            el.children.length === 0 /* leaf node */) {
          el.style.display = "none";
        }
      });
      // 2) Section headers like "Non lavoriamo con"
      root.querySelectorAll("h1,h2,h3,h4,h5,h6,p,div,span").forEach(function (el) {
        var t = (el.textContent || "").trim();
        if (NEGATIVE_HEADERS.indexOf(t) !== -1 && el.children.length === 0) {
          // hide the whole tags-block that follows: walk up to a sensible
          // container and hide it.
          var block = el.closest("[data-testid$='-list'], ul, div") || el;
          // Heuristic: if the block also contains the positive tags
          // (Hospitality, Boutique, etc.) we only remove this one cell —
          // otherwise we can hide the whole block.
          var negativesOnly = NEGATIVE_TAGS.every(function (n) {
            return (block.textContent || "").indexOf(n) !== -1;
          });
          var alsoPositives = /(Hospitality|Boutique|Brand boutique|Studi professionali)/i
            .test(block.textContent || "");
          if (negativesOnly && !alsoPositives) {
            block.style.display = "none";
          } else {
            // fall back: hide just the header element + walk forward
            el.style.display = "none";
          }
        }
      });
      // 3) Individual negative tags — hide each pill that matches
      root.querySelectorAll("li, span, div, button").forEach(function (el) {
        if (el.children.length > 0) return;
        var t = (el.textContent || "").trim();
        if (NEGATIVE_TAGS.indexOf(t) !== -1) {
          // hide the tag pill (walk up a tiny bit for layout container)
          var pill = el.closest("li") || el;
          pill.style.display = "none";
        }
      });
    }

    function run() {
      removeMatching(document.querySelector("#perchi"));
      removeMatching(document.querySelector('[data-testid="whoforus-section"]'));
    }
    run();
    var n = 0;
    var iv = setInterval(function () {
      run();
      n += 1;
      if (n > 30) clearInterval(iv);
    }, 200);
  }

  // ============================================================
  //                FIX #1 · contact form via Resend
  // ============================================================
  // Strategy: register a CAPTURE-phase submit listener so we can run
  // BEFORE React's onSubmit handler. Identify the contact form by the
  // presence of `[data-testid="field-name"]`. Stop propagation, POST to
  // backend, then drive the existing success / error UI manually.

  function findContactForm() {
    var nameField = document.querySelector('[data-testid="field-name"]');
    if (!nameField) return null;
    return nameField.closest("form");
  }

  function getFieldValue(testid) {
    var el = document.querySelector('[data-testid="' + testid + '"]');
    if (!el) return "";
    return (el.value || "").trim();
  }

  function getServiceValue() {
    // service field is a <select> with [data-testid="field-service"]
    var el = document.querySelector('[data-testid="field-service"]');
    if (!el) return "";
    var v = (el.value || "").trim();
    if (v) return v;
    // fallback: read selected <option> text
    var sel = el.querySelector && el.querySelector("option:checked");
    return sel ? (sel.textContent || "").trim() : "";
  }

  // ----- Toast (small, on-brand, lives outside React) -----
  function ensureToastHost() {
    var host = document.getElementById("strato-toast-host");
    if (host) return host;
    host = document.createElement("div");
    host.id = "strato-toast-host";
    host.style.cssText =
      "position:fixed;left:50%;bottom:30px;transform:translateX(-50%);" +
      "z-index:2147482700;display:flex;flex-direction:column;gap:10px;" +
      "pointer-events:none;";
    document.body.appendChild(host);
    return host;
  }
  function toast(text, kind) {
    var host = ensureToastHost();
    var t = document.createElement("div");
    var ok = (kind === "ok");
    t.setAttribute("data-testid", "strato-toast-" + (ok ? "ok" : "err"));
    t.style.cssText =
      "pointer-events:auto;" +
      "padding:14px 22px;border-radius:999px;" +
      "background:" + (ok ? "rgba(20,18,28,0.92)" : "rgba(40,16,20,0.92)") + ";" +
      "color:#ECE9F5;font:500 13px/1.4 Manrope,system-ui,sans-serif;" +
      "letter-spacing:0.02em;" +
      "border:1px solid " + (ok ? "rgba(167,139,250,0.45)" : "rgba(248,113,113,0.45)") + ";" +
      "box-shadow:0 18px 50px -16px rgba(0,0,0,0.6);" +
      "backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);" +
      "opacity:0;transform:translateY(8px);" +
      "transition:opacity 360ms cubic-bezier(0.22,1,0.36,1),transform 360ms cubic-bezier(0.22,1,0.36,1);";
    t.textContent = text;
    host.appendChild(t);
    requestAnimationFrame(function () {
      t.style.opacity = "1";
      t.style.transform = "translateY(0)";
    });
    setTimeout(function () {
      t.style.opacity = "0";
      t.style.transform = "translateY(8px)";
      setTimeout(function () { t.remove(); }, 400);
    }, 4400);
  }

  // ----- Submit handler -----
  var submittingForm = null;   // guard against double submit
  function handleSubmit(ev) {
    var form = ev.target;
    if (!form || form.tagName !== "FORM") return;
    if (!form.querySelector('[data-testid="field-name"]')) return; // not our form
    if (submittingForm === form) {
      ev.preventDefault();
      ev.stopImmediatePropagation();
      return;
    }
    ev.preventDefault();
    ev.stopImmediatePropagation();

    var btn = form.querySelector('[data-testid="submit-lead-btn"]')
           || form.querySelector('button[type="submit"]');
    var originalBtnText = "";

    submittingForm = form;
    if (btn) {
      originalBtnText = btn.innerHTML;
      btn.setAttribute("disabled", "true");
      btn.style.opacity = "0.7";
      btn.style.pointerEvents = "none";
      btn.innerHTML =
        '<span style="display:inline-flex;align-items:center;gap:10px;">' +
        '<span style="width:12px;height:12px;border-radius:50%;border:2px solid rgba(11,10,16,0.25);border-top-color:#0B0A10;animation:strato-spin 700ms linear infinite;"></span>' +
        'Invio in corso…' +
        '</span>';
    }

    var payload = {
      name:          getFieldValue("field-name"),
      email:         getFieldValue("field-email"),
      business_name: getFieldValue("field-business"),
      website:       getFieldValue("field-website"),
      service_type:  getServiceValue(),
      message:       getFieldValue("field-message"),
      source:        "strato-site",
    };

    fetch(CONTACT_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (r) {
        return r.json().then(function (data) { return { ok: r.ok, status: r.status, data: data }; });
      })
      .then(function (res) {
        submittingForm = null;
        if (btn) {
          btn.removeAttribute("disabled");
          btn.style.opacity = "";
          btn.style.pointerEvents = "";
          btn.innerHTML = originalBtnText;
        }
        if (res.ok) {
          showSuccessUI(form);
          toast(res.data.message || "Grazie — ti rispondiamo entro 24 ore lavorative.", "ok");
        } else {
          var msg = "";
          if (res.status === 422 && Array.isArray(res.data && res.data.detail)) {
            var first = res.data.detail[0];
            msg = (first && first.msg) ? first.msg : "Controlla i campi del form.";
          } else if (res.data && res.data.detail) {
            msg = (typeof res.data.detail === "string" ? res.data.detail : "Errore inatteso.");
          } else {
            msg = "Non siamo riusciti a inviare la richiesta. Riprova tra qualche istante.";
          }
          toast(msg, "err");
        }
      })
      .catch(function (err) {
        submittingForm = null;
        if (btn) {
          btn.removeAttribute("disabled");
          btn.style.opacity = "";
          btn.style.pointerEvents = "";
          btn.innerHTML = originalBtnText;
        }
        toast("Connessione assente o server non raggiungibile. Riprova.", "err");
        // eslint-disable-next-line no-console
        console.error("[strato-contact] submit failed:", err);
      });
  }

  function showSuccessUI(form) {
    // The bundle already has a [data-testid="form-success"] element. Toggle
    // its visibility / class state to surface the success ribbon. If it
    // is implemented purely via React state, we fall back to building a
    // minimal inline confirmation banner above the form.
    var existing = document.querySelector('[data-testid="form-success"]');
    if (existing) {
      existing.style.display = "";
      existing.style.opacity = "1";
      existing.style.visibility = "visible";
      // Also reset all field DOM values so the user sees a fresh form
      ["field-name","field-email","field-business","field-website","field-message"]
        .forEach(function (k) {
          var el = document.querySelector('[data-testid="' + k + '"]');
          if (el) el.value = "";
        });
      return;
    }
    // fallback banner
    var banner = document.createElement("div");
    banner.setAttribute("data-testid", "strato-contact-success-banner");
    banner.style.cssText =
      "margin:18px 0;padding:14px 18px;border-radius:14px;" +
      "background:rgba(167,139,250,0.10);border:1px solid rgba(167,139,250,0.45);" +
      "color:#ECE9F5;font:500 14px/1.6 Manrope,system-ui,sans-serif;";
    banner.textContent = "Richiesta inviata. Ti rispondiamo entro 24 ore lavorative.";
    form.parentNode.insertBefore(banner, form);
  }

  // spinner keyframes
  (function injectSpinKf() {
    if (document.getElementById("strato-contact-kf")) return;
    var s = document.createElement("style");
    s.id = "strato-contact-kf";
    s.textContent = "@keyframes strato-spin{to{transform:rotate(360deg)}}";
    document.head.appendChild(s);
  })();

  function arm() {
    // CAPTURE phase so we run before React's onSubmit
    document.addEventListener("submit", handleSubmit, true);

    // ALSO intercept clicks on the submit button — React's mailto handler
    // is bound to the form's onSubmit, but defensive double-binding here
    // ensures we never let the broken mailto path run.
    document.addEventListener("click", function (e) {
      var btn = e.target.closest && e.target.closest('[data-testid="submit-lead-btn"]');
      if (!btn) return;
      var form = btn.closest("form");
      if (!form) return;
      // Let the submit event fire naturally → our submit handler grabs it.
      // We just guard against React calling form.submit() programmatically
      // (it doesn't, but defensive).
    }, true);
  }

  onReady(function () {
    cleanupPerChiSection();
    arm();
  });
})();
