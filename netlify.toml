# ============================================================
# STRATO — Netlify deploy configuration
# Domain: stratolabs.it
# ============================================================

# Static publish — no build step needed (the site is pre-built).
[build]
  publish      = "."
  command      = ""
  functions    = "netlify/functions"

# Resend contact endpoint: the static frontend POSTs to
# /api/strato/contact (same-origin). We route it to the Netlify
# Function so the API key never leaves the server.
[[redirects]]
  from   = "/api/strato/contact"
  to     = "/.netlify/functions/contact"
  status = 200

# Long-cache for hashed bundles (CSS/JS/SVG)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers (premium production defaults)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "interest-cohort=()"
